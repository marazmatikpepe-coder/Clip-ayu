<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clip-АЮ | Профессиональный видеоредактор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Хедер -->
        <header class="header">
            <div class="logo">
                <span class="logo-neon">🎬 Clip-АЮ</span>
                <span class="logo-badge">PRO</span>
            </div>
            <div class="header-controls">
                <button id="importBtn" class="btn btn-secondary">
                    📁 Импорт
                </button>
                <button id="exportBtn" class="btn btn-primary">
                    💾 Экспорт
                </button>
            </div>
        </header>

        <!-- Основная область -->
        <div class="main-workspace">
            <!-- Панель预览 -->
            <div class="preview-panel">
                <div class="video-wrapper">
                    <video id="previewVideo" class="preview-video" controlslist="nodownload"></video>
                    <div class="video-overlay" id="videoOverlay">
                        <button class="play-btn-large" id="largePlayBtn">▶</button>
                    </div>
                    <div class="time-code">
                        <span id="currentTime">00:00:00</span> / <span id="totalTime">00:00:00</span>
                    </div>
                </div>
            </div>

            <!-- Панель инструментов -->
            <div class="tools-panel">
                <div class="tools-tabs">
                    <button class="tab-btn active" data-tab="edit">✂️ Редактирование</button>
                    <button class="tab-btn" data-tab="text">📝 Текст</button>
                    <button class="tab-btn" data-tab="effects">✨ Эффекты</button>
                    <button class="tab-btn" data-tab="audio">🎵 Аудио</button>
                </div>

                <div class="tools-content">
                    <!-- Вкладка Редактирование -->
                    <div class="tab-content active" id="editTab">
                        <div class="control-group">
                            <label>Скорость</label>
                            <div class="speed-buttons">
                                <button class="speed-btn" data-speed="0.25">0.25x</button>
                                <button class="speed-btn" data-speed="0.5">0.5x</button>
                                <button class="speed-btn active" data-speed="1">1x</button>
                                <button class="speed-btn" data-speed="1.5">1.5x</button>
                                <button class="speed-btn" data-speed="2">2x</button>
                                <button class="speed-btn" data-speed="4">4x</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Громкость: <span id="volumeValue">100%</span></label>
                            <input type="range" id="volumeSlider" min="0" max="200" value="100" class="slider">
                        </div>
                        <div class="control-group">
                            <label>Обрезка</label>
                            <div class="trim-controls">
                                <button id="setTrimStartBtn" class="small-btn">◀ Установить начало</button>
                                <button id="setTrimEndBtn" class="small-btn">Установить конец ▶</button>
                                <button id="resetTrimBtn" class="small-btn">⟳ Сброс</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Поворот/Зеркало</label>
                            <div class="transform-buttons">
                                <button id="rotateLeftBtn" class="small-btn">↺ Повернуть</button>
                                <button id="flipHorizontalBtn" class="small-btn">⟷ Отразить</button>
                                <button id="flipVerticalBtn" class="small-btn">⟵⟶ Вертикаль</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Фильтры</label>
                            <div class="filter-buttons">
                                <button class="filter-btn" data-filter="none">Нет</button>
                                <button class="filter-btn" data-filter="grayscale(100%)">Ч/Б</button>
                                <button class="filter-btn" data-filter="sepia(100%)">Сепия</button>
                                <button class="filter-btn" data-filter="brightness(150%)">Ярче</button>
                                <button class="filter-btn" data-filter="contrast(150%)">Контраст</button>
                                <button class="filter-btn" data-filter="blur(3px)">Размытие</button>
                            </div>
                        </div>
                    </div>

                    <!-- Вкладка Текст -->
                    <div class="tab-content" id="textTab">
                        <button id="addTextBtn" class="btn-primary full-width">➕ Добавить текст</button>
                        <div class="text-layers-list" id="textLayersList"></div>
                    </div>

                    <!-- Вкладка Эффекты -->
                    <div class="tab-content" id="effectsTab">
                        <div class="effect-group">
                            <label>Анимация появления</label>
                            <select id="enterAnimation">
                                <option value="none">Нет</option>
                                <option value="fadeIn">Появление</option>
                                <option value="slideInLeft">Слева</option>
                                <option value="slideInRight">Справа</option>
                                <option value="zoomIn">Приближение</option>
                                <option value="bounceIn">Подпрыгивание</option>
                            </select>
                        </div>
                        <div class="effect-group">
                            <label>Анимация исчезновения</label>
                            <select id="exitAnimation">
                                <option value="none">Нет</option>
                                <option value="fadeOut">Исчезание</option>
                                <option value="slideOutLeft">Влево</option>
                                <option value="slideOutRight">Вправо</option>
                                <option value="zoomOut">Отдаление</option>
                            </select>
                        </div>
                        <div class="effect-group">
                            <label>Наложение цвета</label>
                            <input type="color" id="overlayColor" value="#000000">
                            <input type="range" id="overlayOpacity" min="0" max="100" value="0">
                            <span>Непрозрачность: <span id="opacityValue">0</span>%</span>
                        </div>
                    </div>

                    <!-- Вкладка Аудио -->
                    <div class="tab-content" id="audioTab">
                        <div class="control-group">
                            <label>Фоновая музыка</label>
                            <input type="file" id="audioFileInput" accept="audio/*">
                            <div id="audioInfo" class="audio-info"></div>
                            <button id="removeAudioBtn" class="small-btn">Удалить музыку</button>
                        </div>
                        <div class="control-group">
                            <label>Громкость музыки</label>
                            <input type="range" id="bgmVolume" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таймлайн -->
        <div class="timeline-container">
            <div class="timeline-header">
                <div class="timeline-controls">
                    <button id="zoomInBtn" class="icon-btn">🔍+</button>
                    <button id="zoomOutBtn" class="icon-btn">🔍-</button>
                    <button id="splitBtn" class="icon-btn">✂️ Разделить</button>
                    <button id="deleteSegmentBtn" class="icon-btn">🗑️ Удалить</button>
                </div>
            </div>
            <div class="timeline-track" id="timelineTrack">
                <canvas id="thumbnailsCanvas" class="thumbnails-canvas"></canvas>
                <div class="trim-handles">
                    <div class="trim-handle left" id="trimLeft"></div>
                    <div class="trim-handle right" id="trimRight"></div>
                    <div class="trim-region" id="trimRegion"></div>
                </div>
                <div class="playhead" id="playhead"></div>
                <div class="timeline-ruler" id="timelineRuler"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно текста -->
    <div id="textModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 Редактор текста</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="textInput" placeholder="Введите текст" maxlength="200">
                <div class="form-row">
                    <select id="fontSelect">
                        <option value="Arial">Arial</option>
                        <option value="Impact">Impact</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Verdana">Verdana</option>
                        <option value="'Comic Sans MS'">Comic Sans MS</option>
                    </select>
                    <input type="number" id="fontSize" min="8" max="120" value="48">
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                <div class="form-row">
                    <select id="positionSelect">
                        <option value="top-left">Верх-лево</option>
                        <option value="top-center">Верх-центр</option>
                        <option value="top-right">Верх-право</option>
                        <option value="center-left">Центр-лево</option>
                        <option value="center" selected>Центр</option>
                        <option value="center-right">Центр-право</option>
                        <option value="bottom-left">Низ-лево</option>
                        <option value="bottom-center">Низ-центр</option>
                        <option value="bottom-right">Низ-право</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>
                        <input type="checkbox" id="textStroke"> Обводка
                    </label>
                    <input type="color" id="strokeColor" value="#000000" disabled>
                    <input type="number" id="strokeWidth" value="2" min="1" max="10" disabled>
                </div>
                <div class="form-row">
                    <label>Начало (сек): <input type="number" id="startTime" step="0.5" value="0"></label>
                    <label>Конец (сек): <input type="number" id="endTime" step="0.5" value="5"></label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveTextBtn" class="btn-primary">✅ Добавить</button>
            </div>
        </div>
    </div>

    <!-- Прогресс экспорта -->
    <div id="exportProgress" class="export-progress" style="display: none;">
        <div class="progress-header">
            <span>🎬 Экспорт видео...</span>
            <span id="exportPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p id="exportStatus">Подготовка...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
