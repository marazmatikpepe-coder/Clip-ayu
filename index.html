<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clip-АЮ | Видеоредактор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Хедер с логотипом -->
        <header class="header">
            <div class="logo">
                <span class="logo-neon">Clip-АЮ</span>
                <span class="logo-badge">BETA</span>
            </div>
            <div class="header-controls">
                <button id="exportBtn" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Экспорт
                </button>
            </div>
        </header>

        <!-- Область предпросмотра -->
        <div class="preview-area">
            <div class="video-wrapper">
                <video id="previewVideo" class="preview-video" controlslist="nodownload"></video>
                <div class="play-overlay" id="playOverlay">
                    <button class="play-btn-large" id="largePlayBtn">▶</button>
                </div>
            </div>
        </div>

        <!-- Панель управления -->
        <div class="controls-bar">
            <button id="playPauseBtn" class="ctrl-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="speed-selector">
                <select id="speedSelect">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
            <div class="volume-control">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                <input type="range" id="volumeSlider" min="0" max="200" value="100">
                <span id="volumeValue">100%</span>
            </div>
            <button id="addTextBtn" class="ctrl-btn ctrl-btn-text">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/><line x1="17" y1="12" x2="20" y2="15"/><line x1="20" y1="12" x2="17" y2="15"/></svg>
                Текст
            </button>
        </div>

        <!-- Таймлайн -->
        <div class="timeline-container">
            <div class="timeline-header">
                <span class="time-label" id="currentTimeDisplay">0:00</span>
                <span class="time-label" id="durationDisplay">0:00</span>
            </div>
            <div class="timeline-track" id="timelineTrack">
                <canvas id="thumbnailsCanvas" class="thumbnails-canvas"></canvas>
                <div class="trim-handles">
                    <div class="trim-handle left" id="trimLeft"></div>
                    <div class="trim-handle right" id="trimRight"></div>
                    <div class="trim-region" id="trimRegion"></div>
                </div>
                <div class="playhead" id="playhead"></div>
            </div>
            <div class="timeline-tools">
                <button id="splitBtn" class="btn-secondary">✂ Разделить</button>
            </div>
        </div>

        <!-- Список текстовых слоёв -->
        <div class="text-layers-panel" id="textLayersPanel">
            <div class="panel-title">Текстовые слои</div>
            <div id="textLayersList" class="layers-list"></div>
        </div>
    </div>

    <!-- Модальное окно для добавления текста -->
    <div id="textModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Добавить текст</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="textInput" placeholder="Введите текст" maxlength="100">
                <div class="form-row">
                    <select id="fontSelect">
                        <option value="Arial">Arial</option>
                        <option value="Impact">Impact</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Verdana">Verdana</option>
                    </select>
                    <input type="number" id="fontSize" min="16" max="72" value="36">
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                <div class="form-row">
                    <select id="positionSelect">
                        <option value="top">Вверх</option>
                        <option value="center" selected>Центр</option>
                        <option value="bottom">Низ</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Начало (сек): <input type="number" id="startTime" step="0.1" value="0"></label>
                    <label>Конец (сек): <input type="number" id="endTime" step="0.1" value="5"></label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveTextBtn" class="btn-primary">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Прогресс экспорта -->
    <div id="exportProgress" class="export-progress" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p>Экспорт видео...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
